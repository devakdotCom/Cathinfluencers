<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#070311" />
    <link rel="icon" type="image/png" href="/crest.png" />
    <title>VOX ECCLESIAE</title>
    <script>
    (function () {
      var theme = localStorage.getItem('vox-landing-theme');
      document.documentElement.dataset.theme = theme === 'corporate' ? 'corporate' : 'dark';
      if (theme === 'corporate') {
        document.querySelector('meta[name="theme-color"]')?.setAttribute('content', '#ffffff');
      }
    })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
